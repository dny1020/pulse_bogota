services:
  api:
    image: ${PULSE_IMAGE:-ghcr.io/jnarvaar/pulse_bogota:latest}
    container_name: pulse
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "sqlite:////data/pulse_bogota.db"
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_MINUTES: "15"
    volumes:
      - pulse_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pulse_data:
