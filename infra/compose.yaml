services:
  api:
    image: ${PULSE_IMAGE:-ghcr.io/jnarvaar/pulse_bogota:latest}
    container_name: pulse
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+psycopg://pulse:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/pulse"
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_MINUTES: "15"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: /app/logs/pulse_bogota.log
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /mnt/ssd/pulse_bogota/data:/data
      # Local mount so log files survive container restarts and are
      # readable from the host.
      - /mnt/ssd/pulse_bogota/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy_net

  db:
    image: postgres:17-alpine
    container_name: pulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: pulse
    volumes:
      - /mnt/ssd/pulse_bogota/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
