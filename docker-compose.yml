services:
  api:
    # Local dev builds from ./Dockerfile. In deployment (e.g. Raspberry Pi)
    # set PULSE_IMAGE to the GHCR tag and use `docker compose pull` — no build.
    image: ${PULSE_IMAGE:-pulse_bogota:latest}
    build: .
    ports:
      - "8000:8000"
    environment:
      # 4 slashes = absolute path /data/pulse_bogota.db inside the container.
      DATABASE_URL: "sqlite:////data/pulse_bogota.db"
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_MINUTES: "15"
      # Optional API keys — uncomment and fill, or pass them via an .env file.
      # TOMTOM_API_KEY: "..."
      # EVENTBRITE_API_KEY: "..."
      # GOOGLE_PLACES_API_KEY: "..."
    volumes:
      # Named volume keeps the SQLite DB (and all History) across restarts/rebuilds.
      - pulse_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pulse_data:
