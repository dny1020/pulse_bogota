services:
  api:
    # Local dev builds from ./Dockerfile. In deployment (e.g. Raspberry Pi)
    # set PULSE_IMAGE to the GHCR tag and use `docker compose pull` — no build.
    image: ${PULSE_IMAGE:-pulse_bogota:latest}
    build: .
    ports:
      - "8000:8000"
    # API keys (TOMTOM_API_KEY, GOOGLE_PLACES_API_KEY, ...) come from .env;
    # the explicit `environment` entries below override anything in .env.
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+psycopg://pulse:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/pulse"
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_MINUTES: "15"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: pulse
    volumes:
      # Named volume keeps the database (and all History) across restarts/rebuilds.
      - pulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pulse_pgdata:
